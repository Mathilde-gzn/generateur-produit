<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Générateur de contenu produit</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f3;
      color: #1a1a18;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 2rem;
      max-width: 380px;
      width: 100%;
    }
    h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
    p.sub { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
    label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
    input {
      width: 100%;
      font-size: 14px;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      margin-bottom: 14px;
      font-family: inherit;
    }
    input:focus { border-color: #888; }
    button {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      font-weight: 500;
      border-radius: 8px;
      border: none;
      background: #1a1a18;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      margin-bottom: 10px;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .switch {
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-top: 8px;
    }
    .switch a { color: #1a56db; text-decoration: none; cursor: pointer; }
    .msg {
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 14px;
      display: none;
    }
    .msg.error { background: #fef2f2; color: #b91c1c; display: block; }
    .msg.success { background: #f0fdf4; color: #16a34a; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="form-title">Connexion</h1>
    <p class="sub" id="form-sub">Accédez à votre générateur de contenu</p>

    <div class="msg" id="msg"></div>

    <label>Email</label>
    <input type="email" id="email" placeholder="vous@entreprise.com" />

    <label>Mot de passe</label>
    <input type="password" id="password" placeholder="••••••••" />

    <button id="submit-btn" onclick="submit()">Se connecter</button>

    <div class="switch">
      <span id="switch-text">Pas encore de compte ?</span>
<a id="switch-link" onclick="toggleMode()" style="cursor:pointer">Créer un compte</a>    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ⚠️ Remplace par tes vraies infos Supabase
    const SUPABASE_URL = "https://tpyosrakpsohskvmyquo.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Z_j_K1xtt-timok2YJJapw_SQqyl6lH";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isSignup = false;

    function toggleMode() {
      isSignup = !isSignup;
      document.getElementById('form-title').textContent = isSignup ? 'Créer un compte' : 'Connexion';
      document.getElementById('form-sub').textContent = isSignup ? 'Inscrivez-vous gratuitement' : 'Accédez à votre générateur de contenu';
      document.getElementById('submit-btn').textContent = isSignup ? "S'inscrire" : 'Se connecter';
      document.getElementById('switch-text').textContent = isSignup ? 'Déjà un compte ?' : 'Pas encore de compte ?';
      document.getElementById('switch-link').textContent = isSignup ? 'Se connecter' : 'Créer un compte';
      document.getElementById('msg').className = 'msg';
    }

    async function submit() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submit-btn');
      const msg = document.getElementById('msg');

      if (!email || !password) {
        showMsg('error', 'Remplis tous les champs.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Chargement...';

      try {
        if (isSignup) {
          const { data, error } = await supabase.auth.signUp({ email, password });
          if (error) throw error;
          showMsg('success', 'Compte créé ! Vérifie ton email pour confirmer, puis connecte-toi.');
        } else {
          const { data, error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) throw error;
          window.location.href = '/app.html';
        }
      } catch (e) {
        showMsg('error', e.message || 'Une erreur est survenue.');
      } finally {
        btn.disabled = false;
        btn.textContent = isSignup ? "S'inscrire" : 'Se connecter';
      }
    }

    function showMsg(type, text) {
      const msg = document.getElementById('msg');
      msg.className = 'msg ' + type;
      msg.textContent = text;
    }

    // Si déjà connecté, redirige directement
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = '/app.html';
    });
  </script>
</body>
</html>
